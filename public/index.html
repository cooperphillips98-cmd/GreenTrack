<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Legacy Landscape Management</title>
  <link rel="stylesheet" href="style.css?v=12">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta name="theme-color" content="#1b4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<!-- LOGIN -->
<div id="login-section">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="/logo.png" alt="Legacy Landscape Management" style="max-width:220px;margin-bottom:.5rem;display:block;margin-left:auto;margin-right:auto">
        <p>Employee Field App</p>
      </div>
      <div id="login-error" class="alert alert-error section-hidden"></div>
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input id="inp-name" type="text" class="form-control" placeholder="Enter your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">PIN</label>
        <input id="inp-pin" type="password" class="form-control pin-input" placeholder="••••" maxlength="10" inputmode="numeric">
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="login()">Sign In</button>
      <div id="install-banner" class="section-hidden" style="margin-top:.75rem">
        <button class="btn btn-outline btn-block" onclick="installApp()">📱 Add to Home Screen</button>
      </div>
      <div id="ios-banner" class="section-hidden" style="margin-top:.75rem;background:var(--green-pale);border-radius:var(--r-sm);padding:.65rem;font-size:.8rem;color:var(--green-dark);text-align:center;line-height:1.5">
        To install: tap <strong>Share ⬆</strong> then <strong>"Add to Home Screen"</strong>
      </div>
      <div class="text-center mt-2">
        <a href="admin.html" class="text-muted" style="font-size:.8rem">Admin Panel →</a>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-section" class="section-hidden">
  <header class="header">
    <div class="header-logo">
      <span class="header-logo-pill"><img src="/logo.png" alt="Legacy Landscape" style="height:30px;display:block"></span>
    </div>
    <div class="header-user">
      <strong id="hdr-name"></strong>
      <button class="btn btn-ghost" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- Slim status bar -->
  <div id="status-bar" class="status-bar">
    <span id="sb-text">Not clocked in</span>
    <span id="sb-timer-wrap" class="section-hidden"><span class="sb-timer-pill" id="sb-timer">0:00</span></span>
  </div>

  <div id="app-alert" class="section-hidden" style="margin:.75rem 1rem 0"></div>

  <!-- TAB: Home -->
  <div id="tab-home" class="tab-pane container" style="padding-top:.875rem">

    <!-- Active job card (shown when clocked in) -->
    <div id="active-section" class="section-hidden">
      <div class="active-card">
        <div class="active-card-type" id="ac-type">Mowing</div>
        <div class="active-card-client" id="ac-client">Client Name</div>
        <div class="active-card-detail" id="ac-detail">📍 Location</div>
        <div class="active-card-timer" id="ac-timer">0:00:00</div>
        <div class="form-group" style="margin-bottom:.6rem">
          <input id="out-notes" type="text" class="form-control" placeholder="Job notes (optional)">
        </div>
        <div class="form-group" style="margin-bottom:.6rem">
          <label class="form-label" style="color:rgba(255,255,255,.6)">Next Visit</label>
          <input id="job-next-date" type="date" class="form-control">
          <div id="next-date-hint" style="font-size:.72rem;color:rgba(255,255,255,.5);margin-top:.2rem"></div>
        </div>
        <div id="photo-preview-wrap" class="section-hidden" style="margin-bottom:.5rem">
          <img id="photo-preview" src="" alt="" style="width:100%;border-radius:var(--r-sm);max-height:160px;object-fit:cover">
          <button class="btn btn-sm btn-block" style="margin-top:.35rem;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2)" onclick="clearPhoto()">✕ Remove Photo</button>
        </div>
        <label class="btn btn-sm btn-block" style="cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);margin-bottom:.5rem">
          📷 Add Photo
          <input id="photo-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
        </label>
        <button class="btn-huge btn-huge-red" onclick="clockOut()">⏹ Finish Job</button>
      </div>
    </div>

    <!-- Start job UI (shown when idle) -->
    <div id="start-section">

      <!-- Start Last Job Again -->
      <div id="last-job-wrap" class="section-hidden">
        <button class="btn-last-job" onclick="startLastJob()">
          <div>
            <span class="btn-last-job-label">▶ Start Last Job Again</span>
            <span class="btn-last-job-detail" id="last-job-detail">—</span>
          </div>
          <span style="font-size:1.4rem;opacity:.5">→</span>
        </button>
      </div>

      <!-- Client selection -->
      <div class="field-label">Client</div>
      <div id="client-buttons" class="client-grid"></div>
      <button class="btn-add-new" onclick="showNewClientForm()">+ New Client</button>

      <!-- Inline new client form -->
      <div id="new-client-form" class="section-hidden" style="background:#fff;border-radius:var(--r);padding:1rem;margin-top:.5rem;box-shadow:var(--shadow-sm)">
        <div style="font-weight:700;font-size:.9rem;margin-bottom:.65rem">New Client</div>
        <input id="nc-name-inline" type="text" class="form-control" placeholder="Client name *" style="margin-bottom:.45rem">
        <input id="nc-phone-inline" type="tel" class="form-control" placeholder="Phone (optional)" style="margin-bottom:.45rem">
        <input id="nc-addr-inline" type="text" class="form-control" placeholder="Address (optional)" style="margin-bottom:.75rem">
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-outline btn-sm" onclick="hideNewClientForm()">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="saveNewClientInline()">Save Client</button>
        </div>
      </div>

      <!-- Job type buttons -->
      <div class="field-label">Job Type</div>
      <div class="job-type-grid">
        <button class="job-type-btn" data-type="Mowing" onclick="selectJobType(this)"><span class="jt-icon">🌿</span>Mowing</button>
        <button class="job-type-btn" data-type="Trimming / Edging" onclick="selectJobType(this)"><span class="jt-icon">✂️</span>Trimming</button>
        <button class="job-type-btn" data-type="General Landscaping" onclick="selectJobType(this)"><span class="jt-icon">🏡</span>Landscaping</button>
        <button class="job-type-btn" data-type="Weed Control" onclick="selectJobType(this)"><span class="jt-icon">🌱</span>Weed Control</button>
        <button class="job-type-btn" data-type="Spray / Treatment" onclick="selectJobType(this)"><span class="jt-icon">💧</span>Spray</button>
        <button class="job-type-btn" data-type="Other" onclick="selectJobType(this)"><span class="jt-icon">⋯</span>Other</button>
      </div>

      <!-- Location -->
      <div class="field-label">Job Site</div>
      <select id="loc-select" class="form-control" style="font-size:1rem;padding:.8rem .9rem">
        <option value="">— Choose location —</option>
      </select>

      <!-- Hidden spray fields (still needed for clock-out spray record) -->
      <input type="hidden" id="job-client" value="">
      <input type="hidden" id="job-client-name" value="">
      <input type="hidden" id="job-client-phone" value="">
      <input type="hidden" id="job-service" value="">
      <input type="hidden" id="job-product" value="">
      <input type="hidden" id="job-type" value="">

      <button class="btn-huge btn-huge-green" onclick="clockIn()">▶ Start Job</button>

    </div>
  </div>

  <!-- TAB: Clients -->
  <div id="tab-clients" class="tab-pane section-hidden container" style="padding-top:.875rem">
    <div class="sec-hdr" style="margin-bottom:.75rem">
      <div style="font-weight:800;font-size:1rem">Clients</div>
      <button class="btn btn-primary btn-sm" onclick="showWorkerTab('home');setTimeout(showNewClientForm,100)">+ Add</button>
    </div>
    <div class="card" style="padding:.5rem 1rem">
      <div id="clients-tab-list"><div class="table-empty">Loading…</div></div>
    </div>
  </div>

  <!-- TAB: Jobs -->
  <div id="tab-jobs" class="tab-pane section-hidden container" style="padding-top:.875rem">
    <div class="sec-hdr" style="margin-bottom:.75rem">
      <div style="font-weight:800;font-size:1rem">Recent Jobs</div>
      <button class="btn btn-outline btn-sm" onclick="loadJobs(true)">Load All</button>
    </div>
    <div class="card" style="padding:.5rem 1rem">
      <div id="jobs-list"><div class="table-empty">No jobs yet</div></div>
    </div>
  </div>

  <!-- TAB: Hours -->
  <div id="tab-hours" class="tab-pane section-hidden container" style="padding-top:.875rem">
    <div class="week-stat">
      <div class="week-stat-value" id="week-hours">—</div>
      <div class="week-stat-label">This Week's Total Hours</div>
    </div>
    <div class="card">
      <div class="sec-hdr">
        <div class="card-title mb-0">Breakdown</div>
        <button class="btn btn-outline btn-sm" onclick="exportHoursCSV()">Export CSV</button>
      </div>
      <div id="week-breakdown"><div class="table-empty">Loading…</div></div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="bottom-nav-btn active" id="nav-home" onclick="showWorkerTab('home')">
      <span class="bottom-nav-icon">🏠</span>Home
    </button>
    <button class="bottom-nav-btn" id="nav-clients" onclick="showWorkerTab('clients')">
      <span class="bottom-nav-icon">👥</span>Clients
    </button>
    <button class="bottom-nav-btn" id="nav-jobs" onclick="showWorkerTab('jobs')">
      <span class="bottom-nav-icon">📋</span>Jobs
    </button>
    <button class="bottom-nav-btn" id="nav-hours" onclick="showWorkerTab('hours')">
      <span class="bottom-nav-icon">📊</span>Hours
    </button>
  </nav>
</div>

<!-- Photo Modal -->
<div id="photo-modal" class="photo-modal section-hidden" onclick="closePhotoModal()">
  <img id="photo-modal-img" src="" alt="Job Photo">
  <div style="color:#fff;font-size:.8rem;margin-top:.5rem;opacity:.7">Tap to close</div>
</div>

<script src="app.js"></script>
</body>
</html>
